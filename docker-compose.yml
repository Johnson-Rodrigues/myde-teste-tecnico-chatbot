services:
  mock-api:
    build:
      context: ./mock-api
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  chatbot-api:
    build:
      context: ./chatbot-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mock-api:
        condition: service_healthy
    restart: unless-stopped
